global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical-alerts"
    - match:
        severity: warning
      receiver: "warning-alerts"

receivers:
  - name: "default"
    webhook_configs:
      - url: "http://app:8000/api/alerts/webhook"
        send_resolved: true

  - name: "critical-alerts"
    webhook_configs:
      - url: "http://app:8000/api/alerts/webhook"
        send_resolved: true
    # Uncomment and configure for production:
    # pagerduty_configs:
    #   - service_key: "YOUR_PAGERDUTY_SERVICE_KEY"
    # slack_configs:
    #   - api_url: "YOUR_SLACK_WEBHOOK_URL"
    #     channel: "#ml-alerts-critical"

  - name: "warning-alerts"
    webhook_configs:
      - url: "http://app:8000/api/alerts/webhook"
        send_resolved: true
    # slack_configs:
    #   - api_url: "YOUR_SLACK_WEBHOOK_URL"
    #     channel: "#ml-alerts"

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
